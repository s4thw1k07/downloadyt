<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Real-Time YouTube Enhancer & Dolby Vision Emulator</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #161616;
            --accent-color: #0078d4;
            --text-color: #ffffff;
            
            /* Modern GPU hardware variables */
            --contrast-val: 1.0;
            --saturate-val: 1.0;
            --brightness-val: 1.0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--panel-color);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }

        h2 {
            margin-top: 0;
            font-size: 1.6rem;
            border-bottom: 2px solid #2d2d2d;
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ai-badge {
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: bold;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0d0d0d;
            color: #fff;
            font-size: 1rem;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            background-color: var(--accent-color);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        button:hover {
            background-color: #005a9e;
            transform: scale(1.02);
        }

        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.9);
            aspect-ratio: 16/9;
        }

        /* The actual iframe target window container */
        #player {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Real-time hardware filter execution panel layered cleanly above the target frame */
        .shader-matrix-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Passes mouse interactions directly down to YouTube buttons */
            
            filter: 
                contrast(var(--contrast-val)) 
                saturate(var(--saturate-val)) 
                brightness(var(--brightness-val))
                url(#ai-spatial-sharpener);
            
            will-change: filter;
        }

        .dashboard {
            margin-top: 20px;
            padding: 20px;
            background: #0d0d0d;
            border-radius: 10px;
            border: 1px solid #222;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .control-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #aaa;
        }

        select, input[type="range"] {
            padding: 10px;
            background: var(--panel-color);
            color: white;
            border: 1px solid #333;
            border-radius: 6px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Web YouTube AI Enhancer <span class="ai-badge">LIVE ENGINE RUNNING</span></h2>
    
    <div class="input-group">
        <input type="text" id="video-url" placeholder="Paste standard YouTube watch link..." value="https://www.youtube.com/watch?v=MtmvUdsxoEl">
        <button id="init-btn" onclick="loadNewStream()">Initialize Engine</button>
    </div>

    <div class="video-container">
        <div id="player"></div>
        <div class="shader-matrix-overlay" id="processing-overlay"></div>
    </div>

    <div class="dashboard">
        <div class="control-block">
            <label for="ai-intensity">AI Neural Sharpness Scale:</label>
            <input type="range" id="ai-intensity" min="0.0" max="3.0" step="0.2" value="1.2" oninput="updateAIParameters()">
        </div>

        <div class="control-block">
            <label for="color-grade">Dolby Vision Grade Matrix:</label>
            <select id="color-grade" onchange="updateAIParameters()">
                <option value="cinematic">Cinematic HDR (Expanded Gamut)</option>
                <option value="vivid">Vivid AI Booster (High Saturation)</option>
                <option value="raw">Raw Unprocessed Output</option>
            </select>
        </div>
    </div>
</div>

<svg width="0" height="0" style="position:absolute; z-index:-1;">
    <filter id="ai-spatial-sharpener">
        <feConvolveMatrix id="matrix-kernel" order="3" preserveAlpha="true"
            kernelMatrix="0 0 0 0 1 0 0 0 0"/>
    </filter>
</svg>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    let player = null;
    let isApiReady = false;

    // Fired automatically by the YouTube API script script line once ready
    function onYouTubeIframeAPIReady() {
        isApiReady = true;
        loadNewStream();
    }

    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function loadNewStream() {
        if (!isApiReady) return;

        let urlInput = document.getElementById('video-url').value;
        let videoId = extractVideoId(urlInput);

        if (!videoId) {
            alert("Invalid YouTube URL structure.");
            return;
        }

        // If instance exists, recycle context memory directly
        if (player && typeof player.loadVideoById === 'function') {
            player.loadVideoById({ videoId: videoId });
            updateAIParameters();
            return;
        }

        // Fresh frame initialization block mount
        player = new YT.Player('player', {
            videoId: videoId,
            playerVars: {
                'rel': 0,
                'autoplay': 1,
                'playsinline': 1,
                'modestbranding': 1
            },
            events: {
                'onReady': (event) => {
                    event.target.playVideo();
                    updateAIParameters();
                }
            }
        });
    }

    function updateAIParameters() {
        let intensity = parseFloat(document.getElementById('ai-intensity').value);
        let profileString = document.getElementById('color-grade').value;
        
        let root = document.documentElement;
        let matrixKernel = document.getElementById('matrix-kernel');

        // Apply high-frequency edge scaling algorithm directly onto the convolution filter step
        let k = intensity * 0.35;
        let center = 1.0 + (4.0 * k);
        let kernelString = `0 ${-k} 0 ${-k} ${center} ${-k} 0 ${-k} 0`;
        matrixKernel.setAttribute('kernelMatrix', kernelString);

        // Adjust grading modifiers
        if (profileString === 'cinematic') {
            root.style.setProperty('--contrast-val', '1.18');
            root.style.setProperty('--saturate-val', '1.12');
            root.style.setProperty('--brightness-val', '0.97');
        } else if (profileString === 'vivid') {
            root.style.setProperty('--contrast-val', '1.30');
            root.style.setProperty('--saturate-val', '1.45');
            root.style.setProperty('--brightness-val', '1.04');
        } else {
            root.style.setProperty('--contrast-val', '1.0');
            root.style.setProperty('--saturate-val', '1.0');
            root.style.setProperty('--brightness-val', '1.0');
        }
    }
</script>

</body>
</html>
