<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STARVEL Downloader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: #050505; color: #ffffff; height: 100vh; overflow: hidden; }

        #bgVideo {
            position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            z-index: -2; transform: translate(-50%, -50%); object-fit: cover;
        }

        .video-tint {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 13, 13, 0.85); z-index: -1;
        }

        .app-container {
            width: 100%; height: 100%; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.1); display: flex;
            flex-direction: column; padding: 30px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-height: 70px; width: auto; }
        .header p { color: rgba(255, 255, 255, 0.5); font-size: 0.85rem; }

        .url-input {
            width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px; padding: 18px; color: #fff; font-size: 1rem;
            outline: none; text-align: center; transition: 0.3s;
        }
        .url-input:focus { border-color: rgba(255, 255, 255, 0.4); background: rgba(255, 255, 255, 0.06); }

        .thumbnail-box { 
            display: none; text-align: center; margin: 15px auto; 
            background: rgba(255, 255, 255, 0.04); border-radius: 16px; padding: 10px; max-width: 300px;
        }
        .thumbnail-box img { width: 100%; border-radius: 10px; }

        .mode-container {
            display: flex; background: rgba(0, 0, 0, 0.3); border-radius: 12px;
            padding: 5px; margin-bottom: 25px; gap: 5px;
        }
        .mode-toggle {
            flex: 1; background: transparent; border: none; color: rgba(255, 255, 255, 0.4);
            padding: 12px; font-weight: 700; cursor: pointer; border-radius: 8px;
        }
        .mode-toggle.active { background: rgba(255, 255, 255, 0.1); color: #fff; }

        .quality-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 130px));
            gap: 15px; justify-content: center; margin-bottom: 30px;
        }
        .quality-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 20px; cursor: pointer; text-align: center; transition: 0.3s;
        }
        .quality-card:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-5px); }
        .quality-text { font-size: 1.5rem; font-weight: 800; color: #fff; }

        .progress-box { display: none; background: rgba(0, 0, 0, 0.3); border-radius: 14px; padding: 20px; }
        .bar-bg { width: 100%; height: 15px; background: rgba(255, 255, 255, 0.1); border-radius: 8px; overflow: hidden; }
        .bar-fill { 
            width: 0%; height: 100%; background: rgba(255, 255, 255, 0.6); border-radius: 8px; 
            animation: water 2s infinite linear;
        }
        @keyframes water { 0% { background-position: 0 0; } 100% { background-position: 100% 0; } }

        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .folder-btn { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 12px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bgVideo"><source src="neon.mp4" type="video/mp4"></video>
    <div class="video-tint"></div>

    <div class="app-container">
        <div class="header">
            <div class="logo-container"><img src="starvel_logo.png" alt="STARVEL"></div>
            <p>Standalone High-Speed Desktop Video & Audio Extractor</p>
        </div>

        <input type="text" id="urlInput" class="url-input" placeholder="Paste the YouTube Video Link here" oninput="handleUrlInputChange()">

        <div class="thumbnail-box" id="thumbBox">
            <img id="thumbImg" src="" alt="Preview">
            <div id="thumbTitle" style="font-size: 0.8rem; margin-top: 5px;"></div>
        </div>

        <div class="mode-container">
            <button id="modeVideo" class="mode-toggle active" onclick="switchMode('video')">Video Extraction Mode</button>
            <button id="modeAudio" class="mode-toggle" onclick="switchMode('audio')">Audio Extraction Mode</button>
        </div>

        <div class="quality-grid" id="grid"></div>

        <div class="progress-box" id="progressBox">
            <div id="statusTxt" style="margin-bottom: 10px; font-size: 0.9rem;">Status: Initializing...</div>
            <div class="bar-bg"><div id="barFill" class="bar-fill"></div></div>
        </div>

        <div class="footer">
            <button class="folder-btn" onclick="triggerOpenFolder()">Open Downloads Folder</button>
            <div style="text-align: right; color: rgba(255,255,255,0.3);">v1.2.0 STABLE<br>Designed By Sathwik</div>
        </div>
    </div>

    <script>
        let selectedMode = 'video';
        const qualities = {
            video: ['320p', '480p', '720p', '1080p', '4K'],
            audio: ['MP3']
        };

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            qualities[selectedMode].forEach(q => {
                const card = document.createElement('div');
                card.className = 'quality-card';
                card.innerHTML = `<div class="quality-text">${q}</div>`;
                card.onclick = () => runDownload(q);
                grid.appendChild(card);
            });
        }

        function switchMode(m) {
            selectedMode = m;
            document.getElementById('modeVideo').classList.toggle('active', m === 'video');
            document.getElementById('modeAudio').classList.toggle('active', m === 'audio');
            renderGrid();
        }

        function handleUrlInputChange() {
            const url = document.getElementById('urlInput').value.trim();
            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                document.getElementById('thumbBox').style.display = 'block';
                fetch('http://localhost:5000/fetch-metadata', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                })
                .then(r => r.json())
                .then(d => {
                    document.getElementById('thumbImg').src = d.thumbnail;
                    document.getElementById('thumbTitle').innerText = d.title;
                });
            }
        }

        function runDownload(q) {
            document.getElementById('progressBox').style.display = 'block';
            fetch('http://localhost:5000/download', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: document.getElementById('urlInput').value, mode: selectedMode, quality: q})
            })
            .then(() => {
                document.getElementById('statusTxt').innerText = "Status: Complete!";
                document.getElementById('barFill').style.width = "100%";
            });
        }

        function triggerOpenFolder() { fetch('http://localhost:5000/open-folder', { method: 'POST' }); }
        
        switchMode('video');
    </script>
</body>
</html>
