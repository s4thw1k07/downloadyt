<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFetch - Video & MP3 Downloader</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1f1f1f;
            --accent-color: #ff0000;
            --accent-hover: #cc0000;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --toggle-bg: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        h1 span {
            color: var(--accent-color);
        }

        p {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        /* Format Selector Styling */
        .format-selector {
            display: flex;
            justify-content: center;
            background-color: var(--toggle-bg);
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 25px;
            gap: 5px;
        }

        .format-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .format-btn.active {
            background-color: var(--accent-color);
            color: white;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #121212;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .fetch-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .fetch-btn:hover {
            background-color: #e0e0e0;
        }

        .fetch-btn:disabled {
            background-color: #555555;
            color: #888888;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            margin: 20px auto;
            border: 4px solid #333;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-card {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
            text-align: left;
        }

        .video-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .download-btn {
            display: inline-block;
            width: 100%;
            text-align: center;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .download-btn:hover {
            opacity: 0.9;
        }

        .error-msg {
            display: none;
            color: #ff4444;
            margin-top: 15px;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Stream<span>Fetch</span></h1>
    <p>Convert and download YouTube videos or extract MP3 audio files.</p>

    <div class="format-selector">
        <button type="button" class="format-btn active" id="mp4Toggle" onclick="setFormat('mp4')">Video (MP4)</button>
        <button type="button" class="format-btn" id="mp3Toggle" onclick="setFormat('mp3')">Audio (MP3)</button>
    </div>

    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="Paste YouTube link here...">
        <button id="fetchBtn" class="fetch-btn" onclick="fetchMedia()">Fetch</button>
    </div>

    <div class="loader" id="loader"></div>
    <div class="error-msg" id="errorMsg">Failed to process. Make sure your Python backend (app.py) is running!</div>

    <div class="result-card" id="resultCard">
        <div class="video-title" id="videoTitle">Media Title</div>
        <a href="#" id="dlLink" class="download-btn">Download File</a>
    </div>
</div>

<script>
    let selectedFormat = 'mp4';

    function setFormat(format) {
        selectedFormat = format;
        document.getElementById('mp4Toggle').classList.toggle('active', format === 'mp4');
        document.getElementById('mp3Toggle').classList.toggle('active', format === 'mp3');
        document.getElementById('resultCard').style.display = 'none';
    }

    async function fetchMedia() {
        const urlInput = document.getElementById('videoUrl').value.trim();
        const fetchBtn = document.getElementById('fetchBtn');
        const loader = document.getElementById('loader');
        const resultCard = document.getElementById('resultCard');
        const errorMsg = document.getElementById('errorMsg');

        if (!urlInput) {
            alert('Please paste a valid YouTube URL first!');
            return;
        }

        // Reset UI Layout
        errorMsg.style.display = 'none';
        resultCard.style.display = 'none';
        loader.style.display = 'block';
        fetchBtn.disabled = true;

        try {
            // Post request to local Flask backend server
            const response = await fetch('http://127.0.0.1:5000/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput, format: selectedFormat })
            });

            if (!response.ok) throw new Error('Conversion backend failure');

            // Receive file as binary blob data stream
            const blob = await response.blob();
            const downloadUrl = window.URL.createObjectURL(blob);
            
            const dlLink = document.getElementById('dlLink');
            dlLink.href = downloadUrl;
            
            // Set download attribute so it saves the file locally instead of navigating away
            dlLink.download = selectedFormat === 'mp3' ? "audio.mp3" : "video.mp4";
            document.getElementById('videoTitle').innerText = "✨ File ready to save!";

            if (selectedFormat === 'mp3') {
                dlLink.innerText = "Save Audio File (.mp3)";
                dlLink.style.backgroundColor = "#007bff"; // Blue button for audio
            } else {
                dlLink.innerText = "Save Video File (.mp4)";
                dlLink.style.backgroundColor = "#28a745"; // Green button for video
            }

            loader.style.display = 'none';
            fetchBtn.disabled = false;
            resultCard.style.display = 'block';

        } catch (error) {
            loader.style.display = 'none';
            fetchBtn.disabled = false;
            errorMsg.style.display = 'block';
            console.error("Backend Error: ", error);
        }
    }
</script>

</body>
</html>
